<svg width="1400" height="500" viewBox="0 0 1400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="500" fill="#ffffff" />
  
  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="700" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">Federated Hybrid Learning Workflow (FedAvg / FedProx)</text>

  <!-- STEP 1: GLOBAL MODEL BROADCAST -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="220" height="150" rx="10" fill="url(#serverGrad)" filter="url(#shadow)" />
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Central Server</text>
    <rect x="30" y="50" width="160" height="40" rx="5" fill="#f1c40f" />
    <text x="110" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50" text-anchor="middle">Global Model (wᵗ)</text>
    <text x="110" y="110" font-family="Arial, sans-serif" font-size="11" fill="#ecf0f1" text-anchor="middle">Round t Initialization</text>
    
    <text x="110" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">1. Broadcast</text>
  </g>

  <!-- Broadcast Arrows -->
  <path d="M320,225 L450,150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" fill="none" />
  <path d="M320,225 L450,225" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" fill="none" />
  <path d="M320,225 L450,300" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" fill="none" />

  <!-- STEP 2: DECENTRALIZED CLIENTS -->
  <g transform="translate(500, 100)">
    <text x="100" y="-10" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2980b9" text-anchor="middle">Decentralized Clients (K=5)</text>
    
    <!-- Client 1 -->
    <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#clientGrad)" filter="url shadow" />
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Hospital A (Client 1)</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="10" fill="#ecf0f1" text-anchor="middle">IID/Non-IID Lung CT Data</text>

    <!-- Client 2 -->
    <rect x="0" y="75" width="200" height="60" rx="8" fill="url(#clientGrad)" filter="url shadow" />
    <text x="100" y="100" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Hospital B (Client 2)</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="10" fill="#ecf0f1" text-anchor="middle">IID/Non-IID Lung CT Data</text>

    <!-- Client K -->
    <text x="100" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#95a5a6" text-anchor="middle">...</text>

    <rect x="0" y="190" width="200" height="60" rx="8" fill="url(#clientGrad)" filter="url shadow" />
    <text x="100" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Hospital E (Client 5)</text>
    <text x="100" y="235" font-family="Arial, sans-serif" font-size="10" fill="#ecf0f1" text-anchor="middle">IID/Non-IID Lung CT Data</text>

    <text x="100" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">2. Local Optimization</text>
  </g>

  <!-- STEP 3: LOCAL TRAINING DETAIL -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="250" height="250" rx="15" fill="#f4f6f7" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5" />
    <text x="125" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Local Hybrid Training (LSeTNet)</text>
    
    <rect x="30" y="50" width="190" height="30" rx="5" fill="#3498db" />
    <text x="125" y="70" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Local Optimizer: AdamW</text>
    
    <rect x="30" y="90" width="190" height="30" rx="5" fill="#3498db" />
    <text x="125" y="110" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Local Epochs (E=3)</text>
    
    <rect x="30" y="130" width="190" height="70" rx="5" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1" />
    <text x="125" y="155" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b" text-anchor="middle">FedProx Regularization</text>
    <text x="125" y="180" font-family="Courier New, monospace" font-size="10" fill="#c0392b" text-anchor="middle">μ/2 ||w - wᵗ||²</text>

    <text x="125" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">Updated Weights (wₖᵗ⁺¹)</text>
  </g>

  <!-- Upload Arrows -->
  <path d="M1000,225 L1130,225" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" fill="none" />
  <text x="1065" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">3. Upload</text>

  <!-- STEP 4: AGGREGATION -->
  <g transform="translate(1150, 150)">
    <rect x="0" y="0" width="220" height="150" rx="10" fill="url(#serverGrad)" filter="url shadow" />
    <text x="110" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Server Aggregation</text>
    
    <rect x="20" y="50" width="180" height="40" rx="5" fill="#2ecc71" />
    <text x="110" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Σ (nₖ/n) wₖᵗ⁺¹</text>
    
    <text x="110" y="115" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Updated Global Model</text>
    <text x="110" y="135" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f1c40f" text-anchor="middle">Global Model (wᵗ⁺¹)</text>

    <text x="110" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">4. Global Update</text>
  </g>

  <!-- Loopback Arrow -->
  <path d="M1260,330 C1260,450 110,450 110,330" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)" fill="none" stroke-dasharray="5,5" />
  <text x="685" y="440" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#7f8c8d" text-anchor="middle">Iterate for T=20 Communication Rounds</text>

</svg>
