<svg width="1000" height="1250" viewBox="0 0 1000 1250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1250" fill="#ffffff" />
  
  <defs>
    <style type="text/css">
      .label { font-family: "Times New Roman", Times, serif; font-size: 14px; fill: #333; }
      .title { font-family: "Times New Roman", Times, serif; font-size: 18px; font-weight: bold; fill: #000; }
      .panel-label { font-family: "Arial", sans-serif; font-size: 22px; font-weight: bold; fill: #000; }
      .grid { stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 2,2; }
      .axis { stroke: #333; stroke-width: 1.5; }
      
      /* Line Styles */
      .line-iid { stroke: #3498db; stroke-width: 2.5; fill: none; }
      .line-noniid-avg { stroke: #e67e22; stroke-width: 2; fill: none; stroke-dasharray: 6,4; }
      .line-noniid-prox { stroke: #2ecc71; stroke-width: 2.5; fill: none; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <!-- FIGURE TITLE -->
  <text x="500" y="40" text-anchor="middle" class="title" font-size="24">Federated Training Convergence &amp; Stability Analysis</text>

  <!-- PANEL A: GLOBAL ACCURACY -->
  <g transform="translate(80, 100)">
    <text x="-40" y="-20" class="panel-label">a</text>
    <text x="180" y="-10" text-anchor="middle" class="title">Global Accuracy vs. Rounds</text>
    
    <!-- Axes and Grid -->
    <line x1="0" y1="250" x2="380" y2="250" class="axis" /> <!-- X -->
    <line x1="0" y1="0" x2="0" y2="250" class="axis" />   <!-- Y -->
    <line x1="0" y1="125" x2="380" y2="125" class="grid" />
    <line x1="0" y1="0" x2="380" y2="0" class="grid" />
    
    <!-- Y Labels -->
    <text x="-10" y="255" text-anchor="end" class="label">0.3</text>
    <text x="-10" y="130" text-anchor="end" class="label">0.6</text>
    <text x="-10" y="5" text-anchor="end" class="label">0.9</text>
    <text x="-55" y="125" text-anchor="middle" class="label" transform="rotate(-90, -55, 125)">Accuracy</text>
    
    <!-- X Labels -->
    <text x="0" y="270" text-anchor="middle" class="label">0</text>
    <text x="190" y="270" text-anchor="middle" class="label">10</text>
    <text x="380" y="270" text-anchor="middle" class="label">20</text>
    <text x="190" y="295" text-anchor="middle" class="label">Communication Rounds</text>

    <!-- Data Lines (Simulated based on LSeTNet behavior) -->
    <!-- IID FedAvg (Blue Solid) -->
    <path d="M0,200 L20,180 L40,160 L60,140 L80,125 L100,110 L120,100 L140,90 L160,82 L180,75 L200,68 L220,62 L240,58 L260,54 L280,50 L300,47 L320,44 L340,42 L360,40 L380,38" class="line-iid" />
    <!-- Non-IID FedAvg (Orange Dashed - Oscillatory) -->
    <path d="M0,220 L20,210 L40,195 L60,205 L80,185 L100,170 L120,180 L140,165 L160,150 L180,155 L200,140 L220,130 L240,135 L260,120 L280,110 L300,115 L320,105 L340,100 L360,102 L380,95" class="line-noniid-avg" />
    <!-- Non-IID FedProx (Green Dashed - Smooth) -->
    <path d="M0,215 L20,200 L40,185 L60,170 L80,155 L100,142 L120,130 L140,120 L160,110 L180,102 L200,95 L220,88 L240,82 L260,77 L280,72 L300,68 L320,64 L340,61 L360,58 L380,55" class="line-noniid-prox" />
  </g>

  <!-- PANEL B: GLOBAL LOSS -->
  <g transform="translate(580, 100)">
    <text x="-40" y="-20" class="panel-label">b</text>
    <text x="180" y="-10" text-anchor="middle" class="title">Global Loss (Cross-Entropy)</text>
    
    <line x1="0" y1="250" x2="380" y2="250" class="axis" />
    <line x1="0" y1="0" x2="0" y2="250" class="axis" />
    <line x1="0" y1="125" x2="380" y2="125" class="grid" />
    
    <text x="-10" y="255" text-anchor="end" class="label">0.0</text>
    <text x="-10" y="130" text-anchor="end" class="label">0.6</text>
    <text x="-10" y="5" text-anchor="end" class="label">1.2</text>
    <text x="-55" y="125" text-anchor="middle" class="label" transform="rotate(-90, -55, 125)">Loss</text>
    
    <text x="190" y="295" text-anchor="middle" class="label">Communication Rounds</text>

    <!-- Loss Curves -->
    <path d="M0,50 L20,70 L40,95 L60,120 L80,140 L100,160 L120,175 L140,185 L160,195 L180,205 L200,212 L220,218 L240,223 L260,228 L280,232 L300,235 L320,238 L340,240 L360,242 L380,244" class="line-iid" />
    <path d="M0,30 L20,45 L40,65 L60,55 L80,85 L100,105 L120,95 L140,125 L160,145 L180,135 L200,165 L220,185 L240,175 L260,200 L280,215 L300,205 L320,220 L340,230 L360,225 L380,235" class="line-noniid-avg" />
    <path d="M0,40 L20,60 L40,85 L60,105 L80,125 L100,145 L120,160 L140,175 L160,188 L180,198 L200,208 L220,215 L240,222 L260,228 L280,233 L300,237 L320,240 L340,243 L360,245 L380,247" class="line-noniid-prox" />
  </g>

  <!-- PANEL C: CLIENT DRIFT -->
  <g transform="translate(80, 480)">
    <text x="-40" y="-20" class="panel-label">c</text>
    <text x="180" y="-10" text-anchor="middle" class="title">Weight Divergence (Client Drift)</text>
    
    <line x1="0" y1="250" x2="380" y2="250" class="axis" />
    <line x1="0" y1="0" x2="0" y2="250" class="axis" />
    <line x1="0" y1="125" x2="380" y2="125" class="grid" />
    
    <text x="-10" y="255" text-anchor="end" class="label">0</text>
    <text x="-10" y="5" text-anchor="end" class="label">High</text>
    <text x="-55" y="125" text-anchor="middle" class="label" transform="rotate(-90, -55, 125)">||w_k - w_g||_2</text>
    
    <text x="190" y="295" text-anchor="middle" class="label">Communication Rounds</text>

    <!-- Drift Curves -->
    <path d="M0,100 L20,120 L40,150 L60,180 L100,210 L200,230 L380,240" class="line-iid" />
    <path d="M0,20 L20,40 L40,30 L60,50 L100,45 L200,60 L380,70" class="line-noniid-avg" />
    <path d="M0,50 L20,80 L40,110 L60,140 L100,170 L200,195 L380,210" class="line-noniid-prox" />
  </g>

  <!-- PANEL D: GRADIENT NORM -->
  <g transform="translate(580, 480)">
    <text x="-40" y="-20" class="panel-label">d</text>
    <text x="180" y="-10" text-anchor="middle" class="title">Numerical Stability (Grad Norm)</text>
    
    <line x1="0" y1="250" x2="380" y2="250" class="axis" />
    <line x1="0" y1="0" x2="0" y2="250" class="axis" />
    
    <text x="-10" y="255" text-anchor="end" class="label">0.0</text>
    <text x="-10" y="130" text-anchor="end" class="label">0.5</text>
    <text x="-10" y="5" text-anchor="end" class="label">1.0</text>
    <text x="-55" y="125" text-anchor="middle" class="label" transform="rotate(-90, -55, 125)">||∇L||</text>
    
    <text x="190" y="295" text-anchor="middle" class="label">Communication Rounds</text>

    <!-- Grad Norm (Stable flat lines with noise) -->
    <path d="M0,150 L20,145 L40,155 L60,150 L80,148 L100,152 L120,150 L140,147 L160,153 L180,150 L200,149 L220,151 L240,150 L260,148 L280,152 L300,150 L320,149 L340,151 L360,150 L380,150" stroke="#8e44ad" stroke-width="2" fill="none" />
    <text x="370" y="140" text-anchor="end" class="label" fill="#8e44ad">Stable Clipped Gradients</text>
  </g>

  <!-- PANEL E: COMPARISON AT ROUND 20 -->
  <g transform="translate(80, 880)">
    <text x="-40" y="-20" class="panel-label">e</text>
    <text x="420" y="-10" text-anchor="middle" class="title">Final Performance Comparison (Round 20)</text>
    
    <line x1="0" y1="250" x2="840" y2="250" class="axis" />
    <line x1="0" y1="0" x2="0" y2="250" class="axis" />
    
    <!-- Metric Groups -->
    <!-- Accuracy -->
    <rect x="50" y="40" width="40" height="210" fill="#3498db" />
    <rect x="95" y="80" width="40" height="170" fill="#e67e22" />
    <rect x="140" y="55" width="40" height="195" fill="#2ecc71" />
    <text x="115" y="270" text-anchor="middle" class="label" font-weight="bold">Accuracy</text>

    <!-- F1-Score -->
    <rect x="300" y="50" width="40" height="200" fill="#3498db" />
    <rect x="345" y="100" width="40" height="150" fill="#e67e22" />
    <rect x="390" y="65" width="40" height="185" fill="#2ecc71" />
    <text x="365" y="270" text-anchor="middle" class="label" font-weight="bold">F1-Macro</text>

    <!-- AUC -->
    <rect x="550" y="30" width="40" height="220" fill="#3498db" />
    <rect x="595" y="70" width="40" height="180" fill="#e67e22" />
    <rect x="640" y="40" width="40" height="210" fill="#2ecc71" />
    <text x="615" y="270" text-anchor="middle" class="label" font-weight="bold">AUC-ROC</text>

    <!-- Legend for the whole figure -->
    <g transform="translate(750, 50)">
      <line x1="0" y1="0" x2="30" y2="0" class="line-iid" />
      <text x="35" y="5" class="label">IID FedAvg</text>
      
      <line x1="0" y1="30" x2="30" y2="30" class="line-noniid-avg" />
      <text x="35" y="35" class="label">Non-IID FedAvg</text>
      
      <line x1="0" y1="60" x2="30" y2="60" class="line-noniid-prox" />
      <text x="35" y="65" class="label">Non-IID FedProx</text>
    </g>
  </g>

  <!-- CAPTION HINT (Simplified) -->
  <text x="500" y="1220" text-anchor="middle" class="label" font-style="italic">Note: Dirichlet allocation α=0.5 used for Non-IID. FedProx weight μ=0.01.</text>
</svg>