<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1400" height="400" fill="#ffffff" />
  
  <!-- Definitions for Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#000" />
    </marker>
  </defs>

  <!-- Title Box -->
  <rect x="600" y="20" width="200" height="40" fill="#fbc4c4" stroke="#e74c3c" stroke-width="1" />
  <text x="700" y="47" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#c0392b">LSeTNet</text>

  <!-- BLOCK 1: Backbone (224 to 28) -->
  <g transform="translate(50, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">224×224</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#a8d5ff" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">CNN Backbone</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(Conv + GN + Pool)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">4x Conv2D (3×3)</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GroupNorm (G=8)</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ReLU Activation</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">3x MaxPool2D</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="200" y1="105" x2="235" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 2: Transition (28x28) -->
  <g transform="translate(240, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">28×28</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#b8e2b8" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Transition Block</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(Spatial Bottleneck)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Conv2D (128→32)</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GroupNorm</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SE Block</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Dropout (0.2)</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="390" y1="105" x2="425" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 3: Residual Blocks (28x28) -->
  <g transform="translate(430, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">28×28</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#f5a6a6" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Residual SE Stage</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(2x SE Blocks)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ResidualSEBlock 1</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ResidualSEBlock 2</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GroupNorm (Internal)</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SE Recalibration</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="580" y1="105" x2="615" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 4: Final Conv + Pool (28 to 14) -->
  <g transform="translate(620, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">14×14</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#98e2e2" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Conv Stage 5</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(Downsampling)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Conv2D (128 ch)</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GroupNorm</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">SE Block</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">MaxPool2D (Stride 2)</text>
  </g>

  <!-- Arrow 4 -->
  <line x1="770" y1="105" x2="805" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 5: Attention Module (CBAM) (14x14) -->
  <g transform="translate(810, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">14×14</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#c5a3d4" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Attention Module</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(CBAM)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Channel Attention</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Spatial Attention</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Feature Refinement</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="960" y1="105" x2="995" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 6: Transformer (14x14) -->
  <g transform="translate(1000, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">14×14</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#ffbd66" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Transformer Block</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(Global Context)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Proj + Pos. Emb.</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Multi-Head Attn (8)</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">FFN (GELU)</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">LayerScale + DropPath</text>
  </g>

  <!-- Arrow 6 -->
  <line x1="1150" y1="105" x2="1185" y2="105" stroke="#000" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- BLOCK 7: Classification Head (1x1) -->
  <g transform="translate(1190, 80)">
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1×1</text>
    <rect x="0" y="25" width="150" height="50" rx="8" fill="#d3d3d3" stroke="#333" stroke-width="1.5" />
    <text x="75" y="48" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Classifier Head</text>
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">(3 Classes)</text>
    
    <!-- Sub-layers -->
    <rect x="10" y="85" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="100" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GlobalAvgPool</text>
    <rect x="10" y="112" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="127" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">GlobalMaxPool</text>
    <rect x="10" y="139" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="154" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">LayerNorm (512)</text>
    <rect x="10" y="166" width="130" height="22" rx="5" fill="#fff" stroke="#333" />
    <text x="75" y="181" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Dense (3 Classes)</text>
  </g>

  <!-- LEGEND -->
  <g transform="translate(450, 320)">
    <rect x="0" y="0" width="20" height="20" rx="3" fill="#a8d5ff" stroke="#333" />
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="12">CNN Backbone</text>
    
    <rect x="140" y="0" width="20" height="20" rx="3" fill="#f5a6a6" stroke="#333" />
    <text x="165" y="15" font-family="Arial, sans-serif" font-size="12">Residual SE Block</text>
    
    <rect x="290" y="0" width="20" height="20" rx="3" fill="#c5a3d4" stroke="#333" />
    <text x="315" y="15" font-family="Arial, sans-serif" font-size="12">Attention Module</text>
    
    <rect x="440" y="0" width="20" height="20" rx="3" fill="#ffbd66" stroke="#333" />
    <text x="465" y="15" font-family="Arial, sans-serif" font-size="12">Transformer</text>
  </g>
</svg>
