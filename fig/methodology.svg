<svg width="1200" height="1100" viewBox="0 0 1200 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="1100" fill="#ffffff" />
  
  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc3545" />
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Federated Hybrid CNN-Transformer Framework for Lung Cancer Classification</text>

  <!-- PHASE 1: DATA PREPROCESSING AND DISTRIBUTION -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="1160" height="160" rx="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" />
    <text x="580" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Phase 1: Data Preprocessing and Distribution</text>
    
    <!-- Content Phase 1 -->
    <g transform="translate(30, 45)">
      <!-- Raw Data -->
      <rect x="0" y="0" width="120" height="80" rx="5" fill="#f8d7da" stroke="#dc3545" filter="url(#shadow)" />
      <text x="60" y="35" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Raw Lung CT</text>
      <text x="60" y="55" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Normal, Benign,</text>
      <text x="60" y="68" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Malignant</text>
      
      <line x1="120" y1="40" x2="160" y2="40" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)" />
      
      <!-- Preprocessing Info -->
      <g transform="translate(170, 0)">
        <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Preprocessing Pipeline:</text>
        <text x="0" y="35" font-family="Arial, sans-serif" font-size="10">• CLAHE Contrast Enhancement</text>
        <text x="0" y="52" font-family="Arial, sans-serif" font-size="10">• Spatial Resize (224x224)</text>
        <text x="0" y="69" font-family="Arial, sans-serif" font-size="10">• Intensity Normalization [0,1]</text>
        
        <text x="180" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Distribution Strategy:</text>
        <text x="180" y="35" font-family="Arial, sans-serif" font-size="10">• IID: Uniform Partitioning</text>
        <text x="180" y="52" font-family="Arial, sans-serif" font-size="10">• Non-IID: Dirichlet Skew (α=0.5)</text>
        <text x="180" y="69" font-family="Arial, sans-serif" font-size="10">• Offline Augmentation (n=4,500)</text>
      </g>
      
      <!-- Partitions -->
      <g transform="translate(620, 10)">
        <rect x="0" y="0" width="100" height="25" rx="3" fill="#ced4da" stroke="#333" />
        <text x="50" y="17" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Partition 1 (IID)</text>
        <rect x="0" y="35" width="100" height="25" rx="3" fill="#ced4da" stroke="#333" />
        <text x="50" y="52" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Partition 2 (IID)</text>
        
        <rect x="180" y="17" width="120" height="30" rx="3" fill="#eeb7b7" stroke="#dc3545" />
        <text x="240" y="37" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Partition K (Non-IID)</text>
        <line x1="105" y1="35" x2="175" y2="35" stroke="#333" stroke-width="1.2" stroke-dasharray="3,3" />
      </g>
    </g>
  </g>

  <!-- PHASE 2: DISTRIBUTED TRAINING -->
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="1160" height="180" rx="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" />
    <text x="580" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Phase 2: Distributed Training with Federated Clients (K=5)</text>
    
    <!-- 5 Client Cards -->
    <g transform="translate(30, 45)">
      <!-- Client 1 -->
      <rect x="0" y="0" width="200" height="110" rx="5" fill="white" stroke="#28a745" stroke-width="1.2" filter="url(#shadow)" />
      <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Institution A (C1)</text>
      <rect x="10" y="30" width="180" height="20" fill="#fff3cd" />
      <text x="100" y="44" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Local Dataset Subset</text>
      <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">LSeTNet Local Update</text>
      <text x="100" y="90" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">E=3, η=3e-4, μ=0.01</text>
      
      <!-- Clients 2-4 (Simplified) -->
      <g transform="translate(225, 10)">
        <rect x="0" y="0" width="180" height="80" rx="5" fill="#eafaf1" stroke="#28a745" />
        <text x="90" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Client 2 (IID)</text>
      </g>
      <g transform="translate(430, 10)">
        <text x="15" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#95a5a6">...</text>
      </g>
      <g transform="translate(480, 10)">
        <rect x="0" y="0" width="180" height="80" rx="5" fill="#fdedec" stroke="#e74c3c" />
        <text x="90" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Client 4 (Non-IID)</text>
      </g>
      
      <!-- Client 5 -->
      <g transform="translate(685, 0)">
        <rect x="0" y="0" width="200" height="110" rx="5" fill="white" stroke="#e74c3c" stroke-width="1.2" filter="url(#shadow)" />
        <text x="100" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Institution E (C5)</text>
        <rect x="10" y="30" width="180" height="20" fill="#f8d7da" />
        <text x="100" y="44" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Local Dataset Subset</text>
        <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">LSeTNet Local Update</text>
        <text x="100" y="90" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">FedProx Regularization</text>
      </g>
      
      <!-- Privacy Lock Icon placeholder -->
      <circle cx="1000" cy="55" r="35" fill="none" stroke="#2c3e50" stroke-width="1" stroke-dasharray="3,3" />
      <text x="1000" y="52" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Privacy</text>
      <text x="1000" y="65" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Preserved</text>
    </g>
  </g>

  <!-- PHASE 3: FEDERATED AGGREGATION -->
  <g transform="translate(20, 430)">
    <rect x="0" y="0" width="1160" height="160" rx="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" />
    <text x="580" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Phase 3: Federated Aggregation and Global Model Update</text>
    
    <g transform="translate(300, 45)">
      <rect x="0" y="0" width="560" height="90" rx="5" fill="white" stroke="#333" stroke-width="1.5" filter="url(#shadow)" />
      <text x="280" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Global Aggregation Server (FedAvg / FedProx)</text>
      
      <text x="280" y="55" font-family="Times New Roman, serif" font-style="italic" font-size="14" text-anchor="middle">wᵗ⁺¹ = Σ (nₖ / N) × wₖᵗ⁺¹</text>
      <text x="280" y="78" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#dc3545" font-weight="bold">FedProx: Constrained Client-to-Global Drift Optimization</text>
      
      <!-- Federation Round -->
      <g transform="translate(600, 0)">
        <circle cx="50" cy="45" r="40" fill="none" stroke="#e67e22" stroke-width="2" stroke-dasharray="5,5" />
        <text x="50" y="42" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#d35400">Round</text>
        <text x="50" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">t / 20</text>
      </g>
    </g>

    <!-- Communication Lines -->
    <path d="M150, -20 L300, 45" stroke="#95a5a6" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <path x1="580" y1="-20" x2="580" y2="45" stroke="#95a5a6" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
    <path d="M1000, -20 L860, 45" stroke="#95a5a6" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead)" />
  </g>

  <!-- PHASE 4: LSeTNet ARCHITECTURE -->
  <g transform="translate(20, 610)">
    <rect x="0" y="0" width="1160" height="260" rx="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" />
    <text x="580" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Proposed Hybrid CNN-Transformer Architecture: LSeTNet</text>
    
    <g transform="translate(40, 60)">
      <!-- Input -->
      <rect x="0" y="20" width="60" height="80" fill="#a8d5ff" stroke="#333" />
      <text x="30" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Input CT</text>
      <text x="30" y="128" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">(224×224)</text>
      
      <line x1="60" y1="60" x2="100" y2="60" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowhead-red)" />
      
      <!-- Blocks -->
      <g transform="translate(110, 0)">
        <rect x="0" y="0" width="160" height="120" rx="5" fill="#ced4da" stroke="#333" />
        <text x="80" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CNN Backbone</text>
        <text x="80" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Conv + GN + SE</text>
        <rect x="20" y="70" width="120" height="30" rx="3" fill="white" stroke="#333" />
        <text x="80" y="90" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">ResidualSE Blocks</text>
      </g>
      
      <line x1="270" y1="60" x2="310" y2="60" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowhead-red)" />
      
      <g transform="translate(320, 0)">
        <rect x="0" y="0" width="140" height="120" rx="5" fill="#f5eef8" stroke="#8e44ad" />
        <text x="70" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Attention</text>
        <text x="70" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">CBAM Module</text>
        <text x="70" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Spatial/Channel</text>
      </g>
      
      <line x1="460" y1="60" x2="500" y2="60" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowhead-red)" />
      
      <g transform="translate(510, 0)">
        <rect x="0" y="0" width="220" height="120" rx="5" fill="#fff3cd" stroke="#856404" />
        <text x="110" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Transformer Encoder</text>
        <text x="110" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Multi-Head Attn (8 heads)</text>
        <text x="110" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Global Context Modeling</text>
      </g>
      
      <line x1="730" y1="60" x2="770" y2="60" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowhead-red)" />
      
      <g transform="translate(780, 0)">
        <rect x="0" y="0" width="160" height="120" rx="5" fill="#eafaf1" stroke="#27ae60" />
        <text x="80" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Classifier Head</text>
        <text x="80" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Adaptive Concat</text>
        <text x="80" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Global Pool + MLP</text>
      </g>
      
      <line x1="940" y1="60" x2="980" y2="60" stroke="#dc3545" stroke-width="2" marker-end="url(#arrowhead-red)" />
      
      <g transform="translate(990, 10)">
        <rect x="0" y="0" width="100" height="100" rx="5" fill="#f8f9fa" stroke="#333" />
        <rect x="10" y="10" width="80" height="20" fill="#d4edda" />
        <text x="50" y="24" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Normal</text>
        <rect x="10" y="40" width="80" height="20" fill="#fff3cd" />
        <text x="50" y="54" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Benign</text>
        <rect x="10" y="70" width="80" height="20" fill="#f8d7da" />
        <text x="50" y="84" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Malignant</text>
      </g>

      <!-- Skip Connection -->
      <path d="M190 120 Q550 220 860 120" stroke="#dc3545" stroke-width="1.2" fill="none" stroke-dasharray="5,2" />
      <circle cx="190" cy="120" r="4" fill="#dc3545" />
      <circle cx="860" cy="120" r="4" fill="#dc3545" />
      <text x="525" y="195" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc3545" text-anchor="middle">Residual Skip Connections &amp; Local-to-Global Bridge</text>
    </g>
  </g>

  <!-- PHASE 5: EVALUATION AND XAI -->
  <g transform="translate(20, 890)">
    <rect x="0" y="0" width="1160" height="180" rx="8" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,5" />
    <text x="580" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Phase 4: Evaluation and Multi-Modal Interpretability (XAI)</text>
    
    <g transform="translate(30, 45)">
      <!-- Metrics -->
      <rect x="0" y="0" width="300" height="110" rx="5" fill="#f8f9fa" stroke="#333" filter="url(#shadow)" />
      <text x="150" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Diagnostic Performance</text>
      <text x="30" y="55" font-family="Arial, sans-serif" font-size="10">• Acc / F1 / AUC Analysis</text>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="10">• Global Test Set Validation</text>
      <text x="30" y="95" font-family="Arial, sans-serif" font-size="10">• Statistical Stability T-Tests</text>
      
      <!-- XAI Modules -->
      <g transform="translate(340, 0)">
        <rect x="0" y="0" width="760" height="110" rx="5" fill="#f4f6f7" stroke="#8e44ad" filter="url(#shadow)" />
        <text x="380" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#8e44ad">Explainable AI (XAI) Suite</text>
        
        <rect x="20" y="40" width="220" height="50" rx="3" fill="white" stroke="#8e44ad" />
        <text x="130" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Grad-CAM++</text>
        <text x="130" y="78" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Spatial Lesion Localization</text>
        
        <rect x="270" y="40" width="220" height="50" rx="3" fill="white" stroke="#8e44ad" />
        <text x="380" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">LIME Explainer</text>
        <text x="380" y="78" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Superpixel Attribution</text>
        
        <rect x="520" y="40" width="220" height="50" rx="3" fill="white" stroke="#8e44ad" />
        <text x="630" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Attention Rollout</text>
        <text x="630" y="78" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Self-Attention Connectivity</text>
      </g>
    </g>
  </g>
</svg>
